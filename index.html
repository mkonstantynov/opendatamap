<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Global Military Air Activity & GPS Interference — 14 Feb – 31 Mar 2026</title>
<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#000;font:12px sans-serif;color:#fff}
#map{position:absolute;top:0;left:0;width:100%;height:100%}
#panel{position:absolute;bottom:10px;left:10px;right:10px;background:rgba(0,0,0,0.85);
  padding:10px 14px;border-radius:8px;z-index:10;backdrop-filter:blur(4px)}
.row{display:flex;gap:12px;align-items:center;margin:5px 0;flex-wrap:wrap}
#day-label{font-size:14px;font-weight:bold;min-width:230px}
button{background:#2a2a2a;color:#fff;border:1px solid #555;padding:4px 10px;border-radius:4px;
  cursor:pointer;font-size:12px}
button:hover{background:#444}
select,input[type=range]{accent-color:#e33}
label{cursor:pointer;user-select:none;display:flex;align-items:center;gap:3px}
.sw{width:11px;height:11px;border-radius:2px;display:inline-block}
#log{position:absolute;top:6px;left:6px;color:#6f6;font-size:10px;z-index:100;
  white-space:pre;background:rgba(0,0,0,.6);padding:4px 6px;border-radius:4px;max-width:45vw}
#jamleg{position:absolute;top:8px;right:8px;z-index:120;background:rgba(0,0,0,.85);
  color:#fff;border:1px solid #555;border-radius:5px;padding:8px 10px;font-size:11px;line-height:1.7}
#jamleg i{display:inline-block;width:13px;height:13px;margin-right:6px;vertical-align:-2px;border:1px solid #0004}
#tip{position:absolute;z-index:200;pointer-events:none;background:rgba(0,0,0,.9);
  border:1px solid #666;padding:6px 8px;border-radius:4px;font-size:11px;display:none;line-height:1.5}
</style></head><body>
<div id="map"></div>
<div id="log"></div>
<div id="tip"></div>
<div id="jamleg">
  <div style="font-weight:bold;margin-bottom:5px">GPS Interference<br>
    <span style="font-weight:normal;color:#888;font-size:10px">% aircraft FL250+ with degraded position</span></div>
  <div><i style="background:#8b0000"></i> ≥80% — severe</div>
  <div><i style="background:#e02020"></i> 60–80% — heavy</div>
  <div><i style="background:#f07030"></i> 40–60% — moderate</div>
  <div><i style="background:#f5b942"></i> 20–40% — light</div>
  <div style="color:#888;font-size:10px;margin-top:4px">&lt;20% — background, not shown</div>
</div>
<div id="panel">
  <div class="row">
    <button id="pb" onclick="togglePlay()" style="background:#a33;font-size:13px;padding:5px 14px">▶ PLAY</button>
    <input type="range" id="tl_slider" min="0" max="3974399" value="0" oninput="setT(this.value)" style="flex:1">
    <span id="day-label" style="min-width:250px;font-size:13px">Loading…</span>
  </div>
  <div class="row">
    <span style="color:#888">Speed:</span>
    <select onchange="speed=parseInt(this.value)">
      <option value="1800">30 min/s — day in 48s</option>
      <option value="3600" selected>1 hour/s — day in 24s</option>
      <option value="7200">2 hours/s — day in 12s</option>
      <option value="21600">6 hours/s — day in 4s</option>
      <option value="43200">12 hours/s — day in 2s</option>
      <option value="86400">1 day/s — full timeline in 46s</option>
      <option value="172800">2 days/s — full timeline in 23s</option>
    </select>
    <button onclick="setT(0)">⏮ Restart</button>
    <span id="tl" style="min-width:60px;font-weight:bold;color:#ff0">00:00</span>
  </div>
  <div class="row" id="cats"></div>
  <div class="row" id="nations"></div>
  <div class="row" style="font-size:11px;color:#aaa">
    <span>★ <span style="color:#ff1e1e">US/Israeli strikes on Iran</span></span>
    <span>★ <span style="color:#ff9500">Iranian retaliation</span></span>
    <span>▣ <span style="color:#fff">air bases</span></span>
    <span style="margin-left:14px;color:#666">|</span>
    <span>Basemap:</span>
    <select onchange="setBasemap(this.value)" style="font-size:11px">
      <option value="dark" selected>Dark</option>
      <option value="osm">OpenStreetMap</option>
    </select>
  </div>
</div>
</div>

<script src="https://unpkg.com/pako@2.1.0/dist/pako.min.js"></script>
<script src="https://unpkg.com/deck.gl@8.9.35/dist.min.js"></script>
<script>
const CAT={
  1:{n:'Tankers',    c:[255,60,60]},
  2:{n:'ISR/AEW&C',  c:[255,200,0]},
  3:{n:'Transport',  c:[0,150,255]},
  4:{n:'Fighters',   c:[255,0,255]},
  5:{n:'Helicopters',c:[0,255,150]},
  6:{n:'Trainers',   c:[140,140,140]},
  0:{n:'Other',      c:[90,90,90]}
};
const ON={1:true,2:true,3:true,4:true,5:false,6:false,0:false};
const DAYS=[];
for(let d=14;d<=28;d++)DAYS.push(`2026-02-${String(d).padStart(2,'0')}`);
for(let d=1;d<=31;d++)DAYS.push(`2026-03-${String(d).padStart(2,'0')}`);  // Mar 24 missing in archive
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const L=document.getElementById('log');
function log(s){L.textContent=(L.textContent+'\n'+s).split('\n').slice(-8).join('\n')}

// category checkboxes
const catsDiv=document.getElementById('cats');
Object.entries(CAT).forEach(([k,v])=>{
  const lab=document.createElement('label');
  lab.innerHTML=`<input type="checkbox" ${ON[k]?'checked':''} onchange="ON[${k}]=this.checked;upd()">
    <span class="sw" style="background:rgb(${v.c.join(',')})"></span>${v.n}`;
  catsDiv.appendChild(lab);
});
['GPS interference','Strikes & bases'].forEach((n,i)=>{
  const lab=document.createElement('label');
  lab.style.marginLeft='12px';
  lab.innerHTML=`<input type="checkbox" checked onchange="${i?'SHOW_STRIKES':'SHOW_JAM'}=this.checked;upd()">${n}`;
  catsDiv.appendChild(lab);
});
let SHOW_JAM=true, SHOW_STRIKES=true;
const JAM_MIN=20;  // below 20% = background, not shown
let BASEMAP='dark';   // 'osm' | 'dark'
const TILES={
  osm:  'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
  dark: 'https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'
};
function setBasemap(v){ BASEMAP=v; document.body.style.background = v==='osm'?'#aad3df':'#000'; upd(); }

const NAT=[
 {k:'us',  n:'USA',      pre:['ae','a'],       c:'#4af'},
 {k:'uk',  n:'UK',       pre:['43','40','41','42'], c:'#f44'},
 {k:'uae', n:'UAE',      pre:['896','897','898'], c:'#4f4'},
 {k:'sau', n:'Saudi',    pre:['710','711','712','717'], c:'#ff4'},
 {k:'qat', n:'Qatar',    pre:['06a','06b'],    c:'#f4f'},
 {k:'isr', n:'Israel',   pre:['738','739'],    c:'#4ff'},
 {k:'eu',  n:'Europe',   pre:['3','4','5'],    c:'#fa4'},
 {k:'oth', n:'Other',    pre:[],               c:'#aaa'}
];
const NON={}; NAT.forEach(x=>NON[x.k]=true);
function natOf(hex){
  const h=(hex||'').toLowerCase();
  for(const x of NAT){ for(const p of x.pre){ if(h.startsWith(p)) return x.k; } }
  return 'oth';
}
const natDiv=document.getElementById('nations');
natDiv.innerHTML='<span style="color:#888;min-width:52px">COUNTRY</span>';
NAT.forEach(x=>{
  const lab=document.createElement('label');
  lab.innerHTML=`<input type="checkbox" checked onchange="NON['${x.k}']=this.checked;upd()">
    <span style="color:${x.c}">${x.n}</span>`;
  natDiv.appendChild(lab);
});

let cur=-1, ct=0, playing=false, speed=3600, data=null, jamAll=null, strikes=null, last=0;
let T=0; const TMAX=46*86400-1;   // unified timeline
let loading=false;
function hhmm(s){return String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor(s%3600/60)).padStart(2,'0')}

const deckgl=new deck.DeckGL({
  container:document.getElementById('map'),
  initialViewState:{longitude:20,latitude:30,zoom:2.2},
  controller:true,
  getTooltip:({object})=>{
    if(!object)return null;
    if(object.n) return {html:`<b>${object.n}</b><br>${object.type||''} ${object.date||''}`};
    if(object.h){ const nk=natOf(object.h); const nn=(NAT.find(x=>x.k===nk)||{}).n||'?';
      return {html:`<b>${object.h}</b> ${object.cs||''}<br>${object.t||'—'} ${object.d||''}<br>${CAT[object.c].n} · ${nn}`}; }
    if(object.pct!==undefined) return {html:`GPS interference: <b>${object.pct}%</b>`};
    return null;
  }
});
log('deck.gl '+(typeof deck!=='undefined'?deck.VERSION||'ok':'FAILED TO LOAD'));

async function gz(url){
  const r=await fetch(url);
  if(!r.ok) throw new Error(r.status+' '+url);
  const buf=await r.arrayBuffer();
  const head=new Uint8Array(buf.slice(0,2));
  if(head[0]===0x1f&&head[1]===0x8b) return JSON.parse(pako.ungzip(new Uint8Array(buf),{to:'string'}));
  return JSON.parse(new TextDecoder().decode(buf));
}

async function boot(){
  try{ strikes=await gz('strikes.json'); log('strikes/bases: '+strikes.length); }
  catch(e){ log('strikes.json missing — skipped'); strikes=[]; }
  try{
    let j=null;
    for(const n of ['map_jam_global.json.gz','map_jam_feb.json.gz']){
      try{ j=await gz(n); log('GPS source: '+n); break; }catch(e){}
    }
    if(!j) throw new Error('no jam file');
    if(Array.isArray(j)) jamAll=j;
    else if(j && Array.isArray(j.days)) jamAll=j.days;
    else if(j && typeof j==='object') jamAll=Object.entries(j).map(([d,cells])=>({d,cells}));
    else jamAll=[];
    log('GPS layer: '+jamAll.length+' days');
  }
  catch(e){ log('GPS layer: '+e.message); jamAll=[]; }
  T=0; tick();
  requestAnimationFrame(anim);
}

async function loadDay(idx){
  loading=true; cur=idx;
  document.getElementById('day-label').textContent='Loading '+DAYS[idx]+'…';
  const names=[`map_trips_${DAYS[idx]}.json.gz`,`map_data/map_trips_${DAYS[idx]}.json.gz`,
               `map_trips_${DAYS[idx]}_json.gz`];
  data=null;
  for(const n of names){ try{ data=await gz(n); break; }catch(e){} }
  loading=false;
  if(!data){
    const dw2=DOW[new Date(DAYS[idx]+'T00:00:00Z').getUTCDay()];
    document.getElementById('day-label').textContent=`${DAYS[idx]} (${dw2}) — GPS layer only, no tracks yet`;
    upd(); return;
  }
  const dw=DOW[new Date(DAYS[idx]+'T00:00:00Z').getUTCDay()];
  const wk=(dw==='сб'||dw==='вс')?' ⚠weekend':'';
  document.getElementById('day-label').textContent=`${DAYS[idx]} (${dw})${wk} — ${data.length} aircraft`;
  log(DAYS[idx]+': '+data.length+' aircraft');
  upd();
}

function jamFor(day){
  if(!jamAll)return [];
  const r=jamAll.find(x=>x.d===day);
  if(!r)return [];
  return (r.cells||[]).map(c=>({lat:c[0],lon:c[1],pct:c[2]}));
}

function upd(){
  const ls=[new deck.TileLayer({id:'base_'+BASEMAP,
    data:TILES[BASEMAP],
    minZoom:0,maxZoom:19,tileSize:256,
    renderSubLayers:p=>{const{west,south,east,north}=p.tile.bbox;
      return new deck.BitmapLayer(p,{data:null,image:p.data,bounds:[west,south,east,north]});}
  })];

  if(SHOW_JAM&&jamAll){
    const cells=jamFor(DAYS[cur]);
    const shown=cells.filter(d=>d.pct>=JAM_MIN);
    const H=0.25;  // половина ячейки 0.5 градуса — плитка без зазоров
    if(shown.length) ls.push(new deck.PolygonLayer({id:'jam',data:shown,
      getPolygon:d=>[[d.lon-H,d.lat-H],[d.lon+H,d.lat-H],[d.lon+H,d.lat+H],[d.lon-H,d.lat+H]],
      getFillColor:d=>d.pct>=80?[255,0,0,200]:d.pct>=60?[255,90,0,180]:d.pct>=40?[255,170,0,155]:[255,230,60,120],
      getLineColor:[80,0,0,110],
      getLineWidth:1, lineWidthUnits:'pixels', stroked:true, filled:true,
      pickable:true, extruded:false}));
  }

  if(data){
    const fl=data.filter(d=>ON[d.c] && NON[natOf(d.h)]);
    if(fl.length) ls.push(new deck.PathLayer({id:'ghost',data:fl,
      getPath:d=>d.p, getColor:d=>[...CAT[d.c].c,60], widthMinPixels:1, pickable:false}));
    if(fl.length) ls.push(new deck.TripsLayer({id:'trips',data:fl,
      getPath:d=>d.p, getTimestamps:d=>d.ts, getColor:d=>CAT[d.c].c,
      currentTime:ct, trailLength:1800, widthMinPixels:2,
      capRounded:true, jointRounded:true, pickable:true, fadeTrail:true}));
  }

  if(SHOW_STRIKES&&strikes&&strikes.length){
    const vis=strikes.filter(s=>s.type==='base'||!s.date||s.date<=DAYS[cur]);
    const ICONS={
      strike:'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"><polygon points="24,2 29,17 45,17 32,27 37,43 24,33 11,43 16,27 3,17 19,17" fill="#ff1e1e" stroke="#000" stroke-width="1.5"/></svg>`),
      retaliation:'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"><polygon points="24,2 29,17 45,17 32,27 37,43 24,33 11,43 16,27 3,17 19,17" fill="#ff9500" stroke="#000" stroke-width="1.5"/></svg>`),
      base:'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"><rect x="8" y="8" width="32" height="32" fill="none" stroke="#fff" stroke-width="4"/><circle cx="24" cy="24" r="5" fill="#fff"/></svg>`)
    };
    ls.push(new deck.IconLayer({id:'strikes',data:vis,
      getPosition:d=>[d.lon,d.lat],
      getIcon:d=>({url:ICONS[d.type]||ICONS.base, width:48, height:48, anchorY:24}),
      getSize:d=>d.type==='strike'?20:d.type==='retaliation'?17:13,
      sizeUnits:'pixels', pickable:true}));
    ls.push(new deck.TextLayer({id:'strike-labels',data:vis,
      getPosition:d=>[d.lon,d.lat], getText:d=>d.n.split('—')[0].trim(),
      getSize:11, getColor:[255,255,255,200], getPixelOffset:[0,-14],
      fontFamily:'sans-serif', outlineWidth:2, outlineColor:[0,0,0,255],
      visible:true}));
  }

  deckgl.setProps({layers:ls});
  const h=String(Math.floor(ct/3600)).padStart(2,'0'), m=String(Math.floor(ct%3600/60)).padStart(2,'0');
  document.getElementById('tl').textContent=h+':'+m;
}

function setT(v){ T=Math.max(0,Math.min(TMAX,parseInt(v))); tick(); }
function togglePlay(){
  playing=!playing;
  const b=document.getElementById('pb');
  b.textContent=playing?'⏸ PAUSE':'▶ PLAY';
  b.style.background=playing?'#3a3':'#a33';
  last=performance.now();
}
function tick(){
  try{
  const di=Math.min(DAYS.length-1,Math.floor(T/86400));
  ct=T%86400;
  document.getElementById('tl_slider').value=T;
  document.getElementById('tl').textContent=hhmm(ct);
  if(di!==cur && !loading){ loadDay(di); }
  else { upd(); }
  }catch(e){ log('tick: '+e.message); }
}

function anim(now){
  requestAnimationFrame(anim);          // schedule next frame first
  try{
    if(playing){
      const dt=(now-last)/1000;
      T+=dt*speed;
      if(T>TMAX) T=0;
      tick();
    }
  }catch(e){ log('anim: '+e.message); }
  last=now;
}

boot();
</script>
</body></html>
